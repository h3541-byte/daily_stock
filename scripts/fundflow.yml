name: 紫金矿业资金监控

on:
  schedule:
    # 交易日 9:40（竞价后确认资金方向）
    - cron: "40 1 * * 1-5"
    # 交易日 11:40（午盘）
    - cron: "40 3 * * 1-5"
    # 交易日 15:10（收盘）
    - cron: "10 7 * * 1-5"
  workflow_dispatch:  # 手动触发

jobs:
  fundflow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 拉取紫金资金流 → 推送微信
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python fundflow.py
